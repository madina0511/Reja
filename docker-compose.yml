version: "3.8"

services:
  node:
    container_name: reja
    restart: always
    image: madina0511/reja-image
    ports:
      - "3005:4001"
    volumes:
      - ./:/usr/src/app
    working_dir: /usr/src/app
    networks:
      - reja_network
    command: bash -c "npm install && npm run dev"

networks:
  reja_network:
    driver: bridge
